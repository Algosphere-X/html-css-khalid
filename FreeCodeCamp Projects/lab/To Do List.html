<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="To Do List.css">
    <title>Styled To-Do List</title>
</head>

<body>
    <div>
        <h1>My To-Do List</h1>
        <ul class="todo-list">

            <li>
                <input type="checkbox" id="gaming-keyboards">
                <label for="gaming-keyboards">Explore gaming keyboards</label>
                <ul class="sub-item">
                    <li><a href="https://www.ryans.com/" class="sub-item-link" target="_blank">Store link</a></li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="codeCamp">
                <label for="codeCamp">FreeCodeCamp</label>
                <ul class="sub-item">
                    <li><a target="_blank" href="https://www.freecodecamp.org/" class="sub-item-link">Visit FreeCodeCamp</a></li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="khan-academy">
                <label for="khan-academy">Khan Academy</label>
                <ul class="sub-item">
                    <li><a target="_blank" href="https://www.khanacademy.org/" class="sub-item-link">Visit Khan Academy</a></li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="W3-school">
                <label for="W3-school">W3 School</label>
                <ul class="sub-item">
                    <li><a target="_blank" href="https://www.w3schools.com/" class="sub-item-link">Visit W3 School</a></li>
                </ul>
            </li>
        </ul>
    </div>
</body>

</html>
