<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">freeCodeCamp Survey Form --for Cirtifications</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>
    <form action="POST" id="survey-form">
        <label for="name" id="name-label">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required> <br>
        
        <label for="email" id="email-label">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email" required> <br>
        
        <label for="number" id="number-label">Age(optional)</label>
        <input type="number" id="number" name="age" min="3" max="100" placeholder="Age"><br>
        
        <label for="role">Which option best describes your current role?</label> <br>
        <select name="role" id="dropdown" placeholder="Select a role">
            <option value="student">Student</option>
            <option value="job">Job</option>
            <option value="other">Other</option>
        </select>
        <p>Would you recommend freeCodeCamp to a friend?</p>
        <input type="radio" name="fav" id="yes" value="yes"> 
        <label for="yes">YES</label>
        <input type="radio" name="fav" id="no" value="no">
        <label for="fav">NO</label>
        <input type="radio" name="fav" id="not-sure" value="not sure">
        <label for="fav">Not Sure</label>
        <p>What would you like to see improved? (Check all that apply)</p>
        <input type="checkbox" id="forntend" name="forntend" value="forntend">
        <label for="forntend">Fornt-end</label>
        <input type="checkbox" id="backend" name="backend" value="backend">
        <label for="backend">Backend</label> <br>
        <p>Any comments or suggestions?</p>
        <textarea name="comment" cols="30" rows="4"></textarea> <br>
        <button type="submit" id="submit">Submit</button>
    </form>
  </body>
</html>
